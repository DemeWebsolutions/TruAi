<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruAi - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0b0d11;
        }

        .loading-gif {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <img
        src="/TruAi/assets/images/TruAi-Loading-Entrance.gif"
        alt=""
        class="loading-gif"
        onerror="setTimeout(function(){ var q = window.location.search || ''; window.location.href = '/TruAi/welcome.html' + (q ? q : '?'); }, 2000);"
    />

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect') || '/TruAi/';
        const username = urlParams.get('username') || '';

        function redirectToWelcome() {
            return `/TruAi/welcome.html?username=${encodeURIComponent(username)}&redirect=${encodeURIComponent(redirectUrl)}`;
        }

        const loadingDuration = 4000;
        let redirectTimer = setTimeout(() => {
            window.location.href = redirectToWelcome();
        }, loadingDuration);

        document.addEventListener('click', () => {
            clearTimeout(redirectTimer);
            window.location.href = redirectToWelcome();
        });
        document.addEventListener('keydown', () => {
            clearTimeout(redirectTimer);
            window.location.href = redirectToWelcome();
        });

        const gif = document.querySelector('.loading-gif');
        gif.addEventListener('error', () => {
            clearTimeout(redirectTimer);
            setTimeout(() => { window.location.href = redirectToWelcome(); }, 2000);
        });
    </script>
</body>
</html>
