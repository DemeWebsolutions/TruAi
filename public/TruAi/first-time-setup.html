<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruAi - Set Your Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #0b0d11;
            color: #e8e9eb;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(42, 42, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 32px;
            max-width: 420px;
            width: 100%;
        }
        h1 { font-size: 22px; margin-bottom: 8px; }
        .subtitle { color: #8b8d98; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: #8b8d98; margin-bottom: 6px; }
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: #008ed6; }
        .error { color: #ff6b6b; font-size: 13px; margin-top: 6px; }
        .success { color: #22c55e; font-size: 13px; margin-top: 6px; }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: #008ed6;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #0077b8; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .requirements { font-size: 12px; color: #6b6d78; margin-top: 16px; line-height: 1.5; }
        .next-step { margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 13px; color: #8b8d98; }
        .next-step a { color: #008ed6; text-decoration: none; }
        .next-step a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Set your password</h1>
        <p class="subtitle">You're using a temporary password. Choose a new password to continue.</p>
        <form id="changeForm">
            <div class="form-group">
                <label for="current">Current (temporary) password</label>
                <input type="password" id="current" name="current_password" required autocomplete="current-password" placeholder="Enter temporary password">
                <div id="currentError" class="error" style="display:none;"></div>
            </div>
            <div class="form-group">
                <label for="new">New password</label>
                <input type="password" id="new" name="new_password" required autocomplete="new-password" placeholder="At least 12 characters">
                <div id="newError" class="error" style="display:none;"></div>
            </div>
            <div class="form-group">
                <label for="confirm">Confirm new password</label>
                <input type="password" id="confirm" name="confirm_password" required autocomplete="new-password" placeholder="Repeat new password">
                <div id="confirmError" class="error" style="display:none;"></div>
            </div>
            <div id="formError" class="error" style="display:none; margin-bottom: 12px;"></div>
            <button type="submit" id="submitBtn">Set password and continue</button>
        </form>
        <p class="requirements">Password must be at least 12 characters and include uppercase, lowercase, a number, and a special character.</p>
        <p class="next-step">After this, you can <a href="/TruAi/ubsas-enroll.html">enroll biometric login</a> (Touch ID / Face ID) or go straight to the dashboard.</p>
    </div>
    <script>
        const API_BASE = (window.location.origin + '/TruAi/api/v1').replace(/\/TruAi\/TruAi/, '/TruAi');
        let csrfToken = '';

        async function ensureAuth() {
            const res = await fetch(API_BASE + '/auth/status', { credentials: 'include' });
            const data = await res.json();
            if (!data.authenticated) {
                window.location.href = '/TruAi/login-portal.html';
                return false;
            }
            csrfToken = data.csrf_token || res.headers.get('X-CSRF-Token') || '';
            return true;
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            if (el) { el.textContent = msg; el.style.display = msg ? 'block' : 'none'; }
        }

        document.getElementById('changeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const current = document.getElementById('current').value;
            const newP = document.getElementById('new').value;
            const confirmP = document.getElementById('confirm').value;
            showError('currentError', '');
            showError('newError', '');
            showError('confirmError', '');
            showError('formError', '');

            if (newP !== confirmP) {
                showError('confirmError', 'Passwords do not match.');
                return;
            }
            if (newP.length < 12) {
                showError('newError', 'Password must be at least 12 characters.');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Updating…';

            try {
                const res = await fetch(API_BASE + '/auth/password/change', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfToken
                    },
                    body: JSON.stringify({ current_password: current, new_password: newP })
                });
                const data = await res.json().catch(() => ({}));

                if (res.ok && data.success) {
                    window.location.href = '/TruAi/loading.html';
                    return;
                }
                showError('formError', data.error || (res.status === 401 ? 'Current password is incorrect.' : 'Could not update password. Try again.'));
            } catch (err) {
                showError('formError', 'Network error. Please try again.');
            }
            btn.disabled = false;
            btn.textContent = 'Set password and continue';
        });

        (async function() {
            if (!(await ensureAuth())) return;
        })();
    </script>
</body>
</html>
